<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WORDGUESS Battle Royale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Clear Sans', 'Segoe UI', Arial, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.3s ease;
        }
        body.game-bg { background: #121213; }
        body.login-bg { background-image: url('/bg-login.png'); }
        body.lobby-bg { background-image: url('/bg-lobby.png'); }
        .game-container { max-width: 1200px; width: 100%; margin: auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .main-panel { flex: 2; min-width: 300px; }
        .side-panel { flex: 1; min-width: 250px; background: rgba(26, 26, 27, 0.9); border-radius: 20px; padding: 15px; backdrop-filter: blur(4px); }
        h1 { text-align: center; font-size: 2rem; margin: 0 0 10px; }
        .auth-card, .lobby-card { background: rgba(26, 26, 27, 0.9); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(4px); }
        .auth-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .auth-card-half { flex: 1; min-width: 250px; background: rgba(26, 26, 27, 0.9); border-radius: 20px; padding: 20px; backdrop-filter: blur(4px); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; background: #2c2c2e; border: none; border-radius: 8px; color: white; font-size: 1rem; }
        button { background: #538d4e; cursor: pointer; font-weight: bold; }
        button:hover { background: #6aaa64; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(26, 26, 27, 0.9); padding: 8px 15px; border-radius: 40px; backdrop-filter: blur(4px); }
        .board { display: flex; flex-direction: column; gap: 5px; margin-bottom: 20px; align-items: center; }
        .row { display: flex; justify-content: center; gap: 5px; }
        .tile { width: 60px; height: 60px; background: #3a3a3c; border: 2px solid #3a3a3c; font-size: 2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; text-transform: uppercase; color: white; }
        .tile.correct { background: #538d4e; border-color: #538d4e; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }
        .keyboard { margin: 20px 0; }
        .key-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
        .key { background: #818384; border: none; border-radius: 4px; color: white; font-weight: bold; font-size: 1rem; padding: 12px 8px; cursor: pointer; text-transform: uppercase; min-width: 32px; flex: 1; text-align: center; transition: background 0.1s; }
        .key.wide { flex: 1.5; }
        .key.correct { background: #538d4e; }
        .key.present { background: #b59f3b; }
        .key.absent { background: #3a3a3c; }
        .message-area { background: rgba(26, 26, 27, 0.9); border-radius: 16px; padding: 12px; margin: 10px 0; text-align: center; backdrop-filter: blur(4px); }
        .players-list { list-style: none; padding: 0; margin: 10px 0; }
        .players-list li { padding: 8px; border-bottom: 1px solid #2c2c2e; display: flex; justify-content: space-between; }
        .countdown { font-size: 5rem; text-align: center; margin: 30px 0; font-weight: bold; color: #facc15; }
        .sound-btn { position: fixed; bottom: 20px; right: 20px; background: #2c2c2e; border-radius: 50%; width: 50px; height: 50px; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.3); }
        @media (max-width: 700px) {
            .tile { width: 45px; height: 45px; font-size: 1.5rem; }
            .key { padding: 8px 4px; font-size: 0.8rem; }
            .countdown { font-size: 3rem; }
            .auth-row { flex-direction: column; }
        }
    </style>
</head>
<body class="login-bg">
<div class="game-container">
    <div class="main-panel">
        <h1> WORDGUESS BATTLE ROYALE</h1>
        <!-- Autenticación -->
        <div id="authScreen">
            <div class="auth-row">
                <div class="auth-card-half">
                    <h3> Registro</h3>
                    <input type="text" id="regUser" placeholder="Usuario (3-20 caracteres)">
                    <input type="password" id="regPass" placeholder="Contraseña (mínimo 6)">
                    <button id="registerBtn">Registrarse</button>
                </div>
                <div class="auth-card-half">
                    <h3> Inicio de sesión</h3>
                    <input type="text" id="loginUser" placeholder="Usuario">
                    <input type="password" id="loginPass" placeholder="Contraseña">
                    <button id="loginBtn">Iniciar sesión</button>
                </div>
            </div>
            <div id="authMsg" class="message-area"></div>
        </div>

        <!-- Lobby -->
        <div id="lobbyScreen" style="display:none;">
            <div class="top-bar">
                <span>👤 <span id="usernameSpan"></span> <span id="adminSpan" style="background:#facc15; color:#000; padding:2px 8px; border-radius:20px;"></span></span>
                <button id="logoutBtn" style="width:auto; background:#e74c3c;">Salir</button>
            </div>
            <div class="lobby-card">
                <h3>🎮 Sala multijugador</h3>
                <label>Dificultad:</label>
                <select id="difficultySelect">
                    <option value="easy"> Fácil (4 letras)</option>
                    <option value="normal" selected> Normal (5 letras)</option>
                    <option value="hard"> Difícil (6 letras)</option>
                </select>
                <button id="createRoomBtn">Crear nueva sala</button>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="joinRoomCode" placeholder="Código de sala" autocomplete="off" style="text-transform:uppercase">
                    <button id="joinRoomBtn" style="width:auto;">Unirse</button>
                </div>
                <div id="lobbyMsg" class="message-area"></div>
            </div>
        </div>

        <!-- Juego -->
        <div id="gameScreen" style="display:none;">
            <div class="top-bar">
                <span>🎲 Sala: <strong id="roomCodeSpan"></strong></span>
                <span>👥 <span id="playerCount">0</span> jugadores</span>
                <button id="leaveRoomBtn" style="width:auto; background:#e74c3c;">Salir</button>
            </div>
            <div id="waitingMsg" class="message-area" style="background:#2c2c2e;"></div>
            <button id="startGameBtn" style="display:none; background:#4caf50;">🎮 Iniciar partida (anfitrión)</button>
            <div id="countdownDisplay" class="countdown" style="display:none;"></div>
            <div id="board" class="board" style="display:none;"></div>
            <div id="keyboard" class="keyboard" style="display:none;"></div>
            <div id="gameMsg" class="message-area"></div>
            <button id="resetGameBtn" style="display:none;">🔄 Nueva ronda (admin)</button>
        </div>
    </div>

    <!-- Panel lateral -->
    <div class="side-panel" id="sidePanel" style="display:none;">
        <h3>🏆 Jugadores en sala</h3>
        <ul id="playersList" class="players-list"></ul>
        <div id="roundResult" class="message-area"></div>
    </div>
</div>

<!-- Botón de sonido -->
<div id="soundToggle" class="sound-btn">🔊</div>

<script>
    const API_BASE = window.location.origin;
    let token = null;
    let connection = null;
    let currentRoom = null;
    let currentWordLength = 5;
    let maxAttempts = 6;
    let currentAttempts = [];
    let gameActive = false;
    let roundActive = false;
    let isAdmin = false;
    let currentLocalGuess = '';
    let currentUsername = '';
    let isWaitingForResult = false;
    let currentOwner = '';
    let gameInProgress = false;
    let lastWord = '';

    // ==================== SOUND SYSTEM ====================
    let audioCtx = null;
    let soundEnabled = true;
    const soundToggleBtn = document.getElementById('soundToggle');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playBeep(frequency = 880, duration = 0.2, volume = 0.4) {
        if (!soundEnabled) return;
        try {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = frequency;
            gain.gain.setValueAtTime(volume, now);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
            osc.start();
            osc.stop(now + duration);
        } catch(e) { console.warn("Audio error:", e); }
    }

    function playTick() { playBeep(880, 0.08, 0.3); }
    function playFanfare() {
        if (!soundEnabled) return;
        playBeep(523.25, 0.2, 0.3);
        setTimeout(() => playBeep(659.25, 0.2, 0.3), 200);
        setTimeout(() => playBeep(783.99, 0.4, 0.3), 400);
    }
    function playTitiTiriTiti() {
        if (!soundEnabled) return;
        playBeep(659.25, 0.1, 0.4);
        setTimeout(() => playBeep(783.99, 0.1, 0.4), 110);
        setTimeout(() => playBeep(880.00, 0.1, 0.4), 220);
        setTimeout(() => playBeep(987.77, 0.12, 0.4), 330);
        setTimeout(() => playBeep(1046.50, 0.2, 0.4), 460);
    }
    function playWrongSound() {
        if (!soundEnabled) return;
        playBeep(330, 0.15, 0.5);
        setTimeout(() => playBeep(261.63, 0.2, 0.5), 150);
        setTimeout(() => playBeep(196.00, 0.3, 0.5), 350);
    }
    function playSadTrombone() {
        if (!soundEnabled) return;
        playBeep(440, 0.3, 0.4);
        setTimeout(() => playBeep(349.23, 0.5, 0.4), 300);
    }
    function playEliminated() {
        if (!soundEnabled) return;
        playBeep(220, 0.2, 0.4);
        setTimeout(() => playBeep(174.61, 0.3, 0.4), 250);
    }
    function playRoundEnd(survivors) {
        if (!soundEnabled) return;
        if (survivors && survivors.length > 0) playBeep(330, 0.6, 0.3);
        else playSadTrombone();
    }

    soundToggleBtn.onclick = () => {
        soundEnabled = !soundEnabled;
        soundToggleBtn.innerText = soundEnabled ? "🔊" : "🔇";
        if (soundEnabled && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    };

    // DOM elements
    const authScreen = document.getElementById('authScreen');
    const lobbyScreen = document.getElementById('lobbyScreen');
    const gameScreen = document.getElementById('gameScreen');
    const sidePanel = document.getElementById('sidePanel');
    const boardDiv = document.getElementById('board');
    const keyboardDiv = document.getElementById('keyboard');
    const gameMsgDiv = document.getElementById('gameMsg');
    const playersListUl = document.getElementById('playersList');
    const roomCodeSpan = document.getElementById('roomCodeSpan');
    const playerCountSpan = document.getElementById('playerCount');
    const countdownDisplay = document.getElementById('countdownDisplay');
    const usernameSpan = document.getElementById('usernameSpan');
    const adminSpan = document.getElementById('adminSpan');
    const waitingMsgDiv = document.getElementById('waitingMsg');
    const startGameBtn = document.getElementById('startGameBtn');

    function setBackground(screen) {
        document.body.classList.remove('login-bg', 'lobby-bg', 'game-bg');
        if (screen === 'login') document.body.classList.add('login-bg');
        else if (screen === 'lobby') document.body.classList.add('lobby-bg');
        else if (screen === 'game') document.body.classList.add('game-bg');
    }

    function showMsg(container, text, isError = false) {
        const msgDiv = document.createElement('div');
        msgDiv.style.color = isError ? '#f87171' : '#86efac';
        msgDiv.textContent = text;
        container.innerHTML = '';
        container.appendChild(msgDiv);
        setTimeout(() => {
            if (container.firstChild === msgDiv) container.innerHTML = '';
        }, 5000);
    }

    // ==================== AUTENTICACIÓN ====================
    async function register() {
        initAudio();
        const username = document.getElementById('regUser').value.trim();
        const password = document.getElementById('regPass').value.trim();
        if (!username || !password) return showMsg(document.getElementById('authMsg'), 'Completa ambos campos', true);
        if (username.length < 3 || username.length > 20) return showMsg(document.getElementById('authMsg'), 'Usuario debe tener 3-20 caracteres', true);
        if (password.length < 6) return showMsg(document.getElementById('authMsg'), 'Contraseña debe tener al menos 6 caracteres', true);
        try {
            const res = await fetch(`${API_BASE}/api/Auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) showMsg(document.getElementById('authMsg'), '✅ Registro exitoso. Ahora inicia sesión.', false);
            else showMsg(document.getElementById('authMsg'), `❌ ${data.message}`, true);
        } catch { showMsg(document.getElementById('authMsg'), 'Error de conexión', true); }
    }

    async function login() {
        initAudio();
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        if (!username || !password) return showMsg(document.getElementById('authMsg'), 'Completa ambos campos', true);
        try {
            const res = await fetch(`${API_BASE}/api/Auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                token = data.data.token;
                localStorage.setItem('token', token);
                currentUsername = username;
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    isAdmin = payload['http://schemas.microsoft.com/ws/2008/06/identity/claims/role'] === 'admin';
                } catch(e) { isAdmin = false; }
                usernameSpan.innerText = username;
                adminSpan.innerText = isAdmin ? 'Admin' : '';
                authScreen.style.display = 'none';
                lobbyScreen.style.display = 'block';
                setBackground('lobby');
                connectSignalR();
            } else {
                showMsg(document.getElementById('authMsg'), `❌ ${data.message}`, true);
            }
        } catch { showMsg(document.getElementById('authMsg'), 'Error de conexión', true); }
    }

    function logout() {
        localStorage.removeItem('token');
        sessionStorage.removeItem('lastRoom');
        if (connection) connection.stop();
        token = null; currentUsername = '';
        authScreen.style.display = 'block';
        lobbyScreen.style.display = 'none';
        gameScreen.style.display = 'none';
        sidePanel.style.display = 'none';
        currentRoom = null;
        setBackground('login');
        resetLocalState();
    }

    function resetLocalState() {
        currentWordLength = 5;
        currentAttempts = [];
        currentLocalGuess = '';
        gameActive = false; roundActive = false; isWaitingForResult = false; gameInProgress = false;
        boardDiv.style.display = 'none';
        keyboardDiv.style.display = 'none';
        countdownDisplay.style.display = 'none';
        startGameBtn.style.display = 'none';
    }

    document.getElementById('registerBtn').onclick = register;
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('logoutBtn').onclick = logout;

    function generateRoomCode() {
        const array = new Uint8Array(4);
        crypto.getRandomValues(array);
        return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('').substring(0, 6).toUpperCase();
    }

    // ==================== LOBBY Y SALAS ====================
    document.getElementById('createRoomBtn').onclick = async () => {
        if (!currentUsername) return showMsg(document.getElementById('lobbyMsg'), 'No estás logueado', true);
        const difficulty = document.getElementById('difficultySelect').value;
        const roomCode = generateRoomCode();
        if (connection) {
            resetLocalState();
            await connection.invoke("CreateRoom", roomCode, difficulty);
            currentRoom = roomCode;
            roomCodeSpan.innerText = roomCode;
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            sidePanel.style.display = 'block';
            setBackground('game');
            showMsg(gameMsgDiv, `Sala creada: ${roomCode}. Esperando a que el anfitrión inicie la partida...`, false);
            sessionStorage.setItem('lastRoom', roomCode);
        }
    };

    document.getElementById('joinRoomBtn').onclick = async () => {
        if (!currentUsername) return showMsg(document.getElementById('lobbyMsg'), 'No estás logueado', true);
        let code = document.getElementById('joinRoomCode').value.trim().toUpperCase();
        if (!code) return showMsg(document.getElementById('lobbyMsg'), 'Ingresa código', true);
        document.getElementById('joinRoomCode').value = code;
        if (connection) {
            resetLocalState();
            await connection.invoke("JoinRoom", code);
            currentRoom = code;
            roomCodeSpan.innerText = code;
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            sidePanel.style.display = 'block';
            setBackground('game');
            showMsg(gameMsgDiv, `Unido a sala ${code}. Esperando al anfitrión...`, false);
            sessionStorage.setItem('lastRoom', code);
        }
    };

    document.getElementById('leaveRoomBtn').onclick = async () => {
        if (connection && currentRoom) {
            await connection.invoke("LeaveRoom", currentRoom);
            sessionStorage.removeItem('lastRoom');
        }
        resetLocalState();
        gameScreen.style.display = 'none';
        sidePanel.style.display = 'none';
        lobbyScreen.style.display = 'block';
        setBackground('lobby');
        currentRoom = null;
    };

    startGameBtn.onclick = async () => {
        if (connection && currentRoom && currentUsername === currentOwner && !gameInProgress) {
            await connection.invoke("StartGameByHost", currentRoom);
        } else if (gameInProgress) {
            showMsg(gameMsgDiv, 'El juego ya comenzó, no puedes iniciar de nuevo.', true);
        } else {
            showMsg(gameMsgDiv, 'No eres el anfitrión', true);
        }
    };

    // ==================== TABLERO Y TECLADO ====================
    function buildBoard(length) {
        boardDiv.innerHTML = '';
        for (let i = 0; i < maxAttempts; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < length; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            boardDiv.appendChild(row);
        }
    }

    function updateBoardFromAttempts(attemptsList) {
        for (let i = 0; i < maxAttempts; i++) {
            for (let j = 0; j < currentWordLength; j++) {
                const tile = document.getElementById(`tile-${i}-${j}`);
                if (tile) { tile.innerText = ''; tile.className = 'tile'; }
            }
        }
        for (let idx = 0; idx < attemptsList.length; idx++) {
            const attempt = attemptsList[idx];
            const guess = attempt.guess;
            const result = attempt.result;
            for (let pos = 0; pos < guess.length && pos < currentWordLength; pos++) {
                const tile = document.getElementById(`tile-${idx}-${pos}`);
                if (tile) {
                    tile.innerText = guess[pos].toUpperCase();
                    let statusClass = '';
                    if (result[pos].status === 'correct') statusClass = 'correct';
                    else if (result[pos].status === 'present') statusClass = 'present';
                    else statusClass = 'absent';
                    tile.classList.add(statusClass);
                }
            }
        }
        updateKeyboardFromAttempts(attemptsList);
    }

    function updateKeyboardFromAttempts(attemptsList) {
        const keyState = {};
        for (const attempt of attemptsList) {
            const guess = attempt.guess;
            const result = attempt.result;
            for (let i = 0; i < guess.length; i++) {
                const letter = guess[i].toUpperCase();
                const status = result[i].status;
                if (!keyState[letter]) keyState[letter] = status;
                else if (status === 'correct') keyState[letter] = 'correct';
                else if (status === 'present' && keyState[letter] !== 'correct') keyState[letter] = 'present';
            }
        }
        document.querySelectorAll('.key').forEach(key => {
            const letter = key.getAttribute('data-key');
            if (letter && keyState[letter]) {
                key.classList.remove('correct', 'present', 'absent');
                key.classList.add(keyState[letter]);
            } else if (letter) {
                key.classList.remove('correct', 'present', 'absent');
            }
        });
    }

    function buildKeyboard() {
        const rows = [
            ['Q','W','E','R','T','Y','U','I','O','P'],
            ['A','S','D','F','G','H','J','K','L','Ñ'],
            ['ENTER','Z','X','C','V','B','N','M','BACKSPACE']
        ];
        keyboardDiv.innerHTML = '';
        for (const row of rows) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'key-row';
            for (const key of row) {
                const btn = document.createElement('button');
                btn.className = 'key';
                if (key === 'ENTER') btn.classList.add('wide');
                if (key === 'BACKSPACE') btn.classList.add('wide');
                btn.textContent = key === 'ENTER' ? '⏎' : (key === 'BACKSPACE' ? '⌫' : key);
                btn.setAttribute('data-key', key);
                btn.onclick = () => handleKeyPress(key.toLowerCase());
                rowDiv.appendChild(btn);
            }
            keyboardDiv.appendChild(rowDiv);
        }
    }

    function handleKeyPress(key) {
        if (!roundActive || !gameActive || isWaitingForResult) return;
        const currentRow = currentAttempts.length;
        if (currentRow >= maxAttempts) return;
        if (key === 'enter') {
            if (currentLocalGuess.length === currentWordLength) {
                isWaitingForResult = true;
                document.querySelectorAll('.key').forEach(k => k.style.pointerEvents = 'none');
                connection.invoke("MakeGuess", currentRoom, currentLocalGuess)
                    .catch(err => { console.error(err); isWaitingForResult = false; });
                currentLocalGuess = '';
            } else {
                showMsg(gameMsgDiv, `Debes ingresar exactamente ${currentWordLength} letras. Tú escribiste ${currentLocalGuess.length}.`, true);
            }
        } else if (key === 'backspace') {
            if (currentLocalGuess.length > 0) {
                currentLocalGuess = currentLocalGuess.slice(0, -1);
                updateLocalRow(currentRow, currentLocalGuess);
            }
        } else {
            if (currentLocalGuess.length < currentWordLength) {
                currentLocalGuess += key;
                updateLocalRow(currentRow, currentLocalGuess);
            }
        }
    }

    function updateLocalRow(rowIndex, guess) {
        for (let i = 0; i < currentWordLength; i++) {
            const tile = document.getElementById(`tile-${rowIndex}-${i}`);
            if (tile) tile.innerText = i < guess.length ? guess[i].toUpperCase() : '';
        }
    }

    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key === 'Enter') handleKeyPress('enter');
        else if (key === 'Backspace') handleKeyPress('backspace');
        else if (/^[a-zA-Z]$/.test(key)) handleKeyPress(key.toLowerCase());
    });

    // ==================== SIGNALR ====================
    function connectSignalR() {
        if (connection) connection.stop();
        connection = new signalR.HubConnectionBuilder()
            .withUrl(`${API_BASE}/gameHub?access_token=${token}`)
            .withAutomaticReconnect()
            .build();

        connection.on("RoomOwnerChanged", (ownerName) => {
            currentOwner = ownerName;
            if (currentUsername === currentOwner && !gameInProgress) {
                startGameBtn.style.display = 'block';
                waitingMsgDiv.innerHTML = 'Eres el anfitrión. Presiona "Iniciar partida" cuando todos estén listos.';
            } else if (currentUsername === currentOwner && gameInProgress) {
                startGameBtn.style.display = 'none';
                waitingMsgDiv.innerHTML = 'La partida ya comenzó.';
            } else {
                startGameBtn.style.display = 'none';
                waitingMsgDiv.innerHTML = `Esperando a que el anfitrión (${currentOwner}) inicie la partida...`;
            }
        });

        connection.on("PlayersUpdate", (players) => {
            playersListUl.innerHTML = '';
            playerCountSpan.innerText = players.length;
            players.forEach(p => {
                const li = document.createElement('li');
                const guessedIcon = p.hasGuessed ? '✅ ' : '';
                li.innerHTML = `<span>${guessedIcon}${p.name}</span> <span>❤️ ${p.attemptsLeft} | ${p.status}</span>`;
                playersListUl.appendChild(li);
            });
        });

        connection.on("CountdownTick", (seconds) => {
            playTick();
            if (!gameInProgress) { gameInProgress = true; startGameBtn.style.display = 'none'; waitingMsgDiv.innerHTML = '¡La partida ha comenzado!'; }
            countdownDisplay.style.display = 'block';
            countdownDisplay.innerText = seconds;
            boardDiv.style.display = 'none';
            keyboardDiv.style.display = 'none';
            if (seconds === 0) countdownDisplay.style.display = 'none';
        });

        connection.on("RoundStarted", (wordLength) => {
            playFanfare();
            gameInProgress = true;
            startGameBtn.style.display = 'none';
            currentWordLength = wordLength;
            maxAttempts = 6;
            buildBoard(wordLength);
            currentAttempts = [];
            currentLocalGuess = '';
            gameActive = true;
            roundActive = true;
            isWaitingForResult = false;
            document.querySelectorAll('.key').forEach(k => k.style.pointerEvents = '');
            document.querySelectorAll('.key').forEach(key => key.classList.remove('correct', 'present', 'absent'));
            boardDiv.style.display = 'block';
            keyboardDiv.style.display = 'block';
            waitingMsgDiv.style.display = 'none';
            showMsg(gameMsgDiv, `¡Nueva ronda! Adivina la palabra de ${wordLength} letras.`, false);
        });

        connection.on("GuessResult", (result) => {
            isWaitingForResult = false;
            document.querySelectorAll('.key').forEach(k => k.style.pointerEvents = '');
            if (result.success) {
                const attempt = { guess: result.guess, result: result.resultArray };
                currentAttempts.push(attempt);
                updateBoardFromAttempts(currentAttempts);
                updateKeyboardFromAttempts(currentAttempts);
                if (result.gameCompleted) {
                    gameActive = false;
                    roundActive = false;
                    if (result.won) {
                        playTitiTiriTiti();
                        showMsg(gameMsgDiv, `🎉 ¡Adivinaste! Pasas a la siguiente ronda. 🎉`, false);
                    } else {
                        playWrongSound();
                        showMsg(gameMsgDiv, `😞 Fallaste. Has sido eliminado.`, true);
                    }
                } else {
                    playWrongSound();
                    gameActive = true;
                }
            } else {
                showMsg(gameMsgDiv, result.error || 'Intento inválido', true);
            }
        });

        connection.on("RoundEnded", (survivors, word) => {
            lastWord = word;
            playRoundEnd(survivors);
            roundActive = false;
            gameActive = false;
            let msg = `Ronda terminada. Palabra: ${word}. Sobrevivientes: ${survivors.join(', ')}`;
            showMsg(gameMsgDiv, msg, false);
            document.getElementById('resetGameBtn').style.display = isAdmin ? 'block' : 'none';
        });

        connection.on("GameEnded", (winner) => {
            if (winner) {
                playFanfare();
                showMsg(gameMsgDiv, `🏆 ¡${winner} es el ganador absoluto! 🏆`, false);
            } else {
                playSadTrombone();
                if (lastWord) {
                    showMsg(gameMsgDiv, `😵 Todos fueron eliminados. La palabra era: ${lastWord}. Fin del juego.`, true);
                } else {
                    showMsg(gameMsgDiv, `😵 Todos fueron eliminados. Fin del juego.`, true);
                }
            }
            gameInProgress = false;
            roundActive = false;
            gameActive = false;
            setTimeout(() => {
                if (connection && currentRoom) connection.invoke("LeaveRoom", currentRoom);
                sessionStorage.removeItem('lastRoom');
                resetLocalState();
                gameScreen.style.display = 'none';
                sidePanel.style.display = 'none';
                lobbyScreen.style.display = 'block';
                setBackground('lobby');
                currentRoom = null;
            }, 5000);
        });

        connection.on("PlayerEliminated", (playerName) => {
            playEliminated();
            showMsg(gameMsgDiv, `💀 ${playerName} ha sido eliminado`, true);
        });

        connection.on("Error", (err) => showMsg(gameMsgDiv, err, true));

        connection.start().catch(err => console.error("SignalR error:", err));
    }

    document.getElementById('resetGameBtn').onclick = async () => {
        if (isAdmin && connection && currentRoom) await connection.invoke("ForceNewRound", currentRoom);
    };

    buildKeyboard();

    const savedToken = localStorage.getItem('token');
    if (savedToken) {
        token = savedToken;
        authScreen.style.display = 'none';
        lobbyScreen.style.display = 'block';
        setBackground('lobby');
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            currentUsername = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name']
                           || payload['unique_name']
                           || payload['name']
                           || payload['sub']
                           || 'Usuario';
            usernameSpan.innerText = currentUsername;
            isAdmin = payload['http://schemas.microsoft.com/ws/2008/06/identity/claims/role'] === 'admin';
            adminSpan.innerText = isAdmin ? 'Admin' : '';
            console.log("Usuario restaurado desde token:", currentUsername);
        } catch(e) {
            console.error("Error decodificando token:", e);
        }
        connectSignalR();
        const lastRoom = sessionStorage.getItem('lastRoom');
        if (lastRoom && connection) {
            setTimeout(async () => {
                try {
                    await connection.invoke("JoinRoom", lastRoom);
                    currentRoom = lastRoom;
                    roomCodeSpan.innerText = lastRoom;
                    lobbyScreen.style.display = 'none';
                    gameScreen.style.display = 'block';
                    sidePanel.style.display = 'block';
                    setBackground('game');
                    showMsg(gameMsgDiv, `Reconectado a sala ${lastRoom}`, false);
                } catch(err) {
                    console.error("Error al reconectar a la sala:", err);
                    sessionStorage.removeItem('lastRoom');
                    showMsg(gameMsgDiv, "No se pudo reconectar a la sala anterior. Puedes crear o unirte a una nueva.", true);
                }
            }, 1000);
        }
    } else {
        authScreen.style.display = 'block';
        lobbyScreen.style.display = 'none';
        setBackground('login');
    }
</script>
</body>
</html>
